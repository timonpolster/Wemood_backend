services:
  db:
    image: postgres:15-alpine
    container_name: wemood_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wemood_internal

#  pgadmin:
#    image: dpage/pgadmin4
#    container_name: wemood_pgadmin
#    restart: always
#    environment:
#      PGADMIN_DEFAULT_EMAIL: admin@wemood.local
#      PGADMIN_DEFAULT_PASSWORD: admin
#    ports:
#      - "5050:80"
#    networks:
#      - wemood_internal

  backend:
    build: .
    container_name: wemood_api
    restart: always
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        python -m app.backend_pre_start &&
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting production server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - ENVIRONMENT=prod
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wemood_internal

  caddy:
    image: caddy:2-alpine
    container_name: wemood_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - wemood_internal

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  wemood_internal:
    driver: bridge