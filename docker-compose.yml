services:
  db:
    image: postgres:15-alpine
    container_name: wemood_db
    restart: always
    env_file:
      - .env
    ports:
      - "${DB_BIND_IP}:${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wemood_net
  pgadmin:
    image: dpage/pgadmin4
    container_name: wemood_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wemood.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${DB_BIND_IP}:5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wemood_net

volumes:
  postgres_data:

networks:
  wemood_net:
    driver: bridge