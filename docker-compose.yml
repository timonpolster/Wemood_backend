services:

  backend:
    build: .
    container_name: wemood_api
    restart: always
    command: >
      sh -c "
        echo 'Connecting to remote database...' &&
        python -m app.backend_pre_start &&
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  pgadmin:
    image: dpage/pgadmin4
    container_name: wemood_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wemood.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"