services:
  db:
    image: postgres:15-alpine
    container_name: wemood_db
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${DB_BIND_IP:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wemood_net

  backend:
    build: .
    container_name: wemood_api
    restart: always
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        python -m app.backend_pre_start &&
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wemood_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: wemood_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wemood.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wemood_net

volumes:
  postgres_data:

networks:
  wemood_net:
    driver: bridge